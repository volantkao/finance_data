name: Daily Oil Data Update

on:
  schedule:
    # 每天 UTC 時間 22:50 執行 (台北時間 08:00)
    - cron: '50 22 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright requests pandas 
        playwright install --with-deps chromium

      - name: Run data fetch script
        run: python monitor_wti.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add wti_monitor_data.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Daily update: $(date +'%Y-%m-%d')" && git push)
