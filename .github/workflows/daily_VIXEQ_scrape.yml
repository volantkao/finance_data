name: Daily VIXEQ Scraper

on:
  schedule:
    # 設定每天美股收盤後執行 (UTC 22:06 = 台灣時間 06:00)
    - cron: '06 22 * * 1-5' 
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # 賦予寫入權限以便 commit 回去
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        # 直接安裝，不需要 requirements.txt
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas webdriver-manager openpyxl

      - name: Run Scraper
        run: python VIXEQ_scraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          
          # 檢查是否有檔案變動
          if [[ -n $(git status --porcelain) ]]; then
            git add vixeq-history.csv
            git commit -m "📈 Auto-update VIXEQ data: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi

