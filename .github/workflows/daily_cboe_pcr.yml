
name: Daily CBOE PCR Scraper

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 時間午夜執行
  workflow_dispatch: # 允許手動觸發

jobs:
  scrape-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pandas

    - name: Run CBOE PCR scraper
      run: python cboe_pcr_scraper.py

    - name: Commit and push if changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add cboe_pcr_data/*.csv
        git commit -m "Add daily CBOE PCR data for $(date +%Y-%m-%d)" || echo "No changes to commit"
        git push
