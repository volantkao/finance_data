name: Daily taifex Market Monitor

on:
  schedule:
    # 台北時間 20:00 (UTC 12:00) 執行，因為盤後資料通常在 19:00 前公布完畢
    - cron: '0 12 * * *'
  workflow_dispatch: # 允許手動執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas requests lxml html5lib odfpy beautifulsoup4

      - name: Run monitor script
        run: python taifex_monitor.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add market_monitor.csv
          git commit -m "Update market data: $(date +'%Y-%m-%d')" || exit 0
          git push
