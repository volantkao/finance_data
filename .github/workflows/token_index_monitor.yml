name: Token Index Monitor

on:
  schedule:
    # 每天 UTC 09:00 執行（台灣時間 17:00）。時間可自行調整。
    - cron: '0 9 * * *'
  workflow_dispatch:  # 允許手動觸發，方便測試

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Run token index monitor
        run: python token_index_monitor.py

      - name: Commit and push if there are changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add token_index_data/llm_token_expenditure_index.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update LLM Token Expenditure Index data"
            git push
          fi
